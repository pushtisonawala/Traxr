services:
  backend:
    build: .
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    ports:
      - "8080:8080"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: traxr
      POSTGRES_USER: traxr
      POSTGRES_PASSWORD: traxrpass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

volumes:
  postgres_data:
